# Week 4 trades targeted sampling configuration.
# All research thresholds live here so estimator/gate reports can include a stable config hash.
version: 1
stage: pilot  # pilot | stage2

sampling:
  # Real weak windows from S1 horizon-fusion backtest (11-window version).
  # Reference: data/reports/horizon_fusion_ridge_20d_60d.json (per_window.ic_weighted_fusion_metrics)
  #   W5  (2021-09-03 → 2022-02-25): fused IC = -0.093  (Fed pivot / inflation surge)
  #   W10 (2024-03-01 → 2024-08-30): fused IC = +0.011  (AI concentration, near-zero)
  #   W11 (2024-09-06 → 2025-02-28): fused IC = -0.037  (post-election / AI pullback)
  # Total ~18,000 ticker-days (3 windows × ~6000). Streaming mode: 0 DB storage, ~3 MB
  # features parquet. Est wall time ~15h with 8 workers due to Polygon /v3/trades pagination
  # latency (2-10s per page for mega-caps).
  #
  # Window numbering follows the 11-window horizon_fusion file (which has actual IC values).
  # The newer 13-window v5 walkforward file's IC columns are NaN so we can't cross-reference.
  pilot:
    reasons:
      - weak_window
    earnings_window_days: 3
    gap_threshold_pct: 0.03
    weak_window_top_n: 50
    weak_windows:
      - name: W5
        start: "2021-09-03"
        end: "2022-02-25"
      - name: W10
        start: "2024-03-01"
        end: "2024-08-30"
      - name: W11
        start: "2024-09-06"
        end: "2025-02-28"
  stage2:
    top_n_liquidity: 200
    top_liquidity_lookback_days: 20

polygon:
  entitlement_delay_minutes: 15
  rest_max_pages_per_request: 50
  rest_page_size: 50000
  rest_min_interval_seconds: 0.05
  retry_max: 3

budgets:
  max_daily_api_calls: 50000
  max_storage_gb: 200
  max_rows_per_ticker_day: 2000000
  expected_pilot_ticker_days: 30000

features:
  size_threshold_dollars: 1000000
  size_threshold_min_cap_dollars: 250000
  # Intentionally empty for Task 0. Task 6 must record condition distributions and
  # can later populate this from Polygon trade condition-code documentation.
  condition_allow_list: []
  trf_exchange_codes:
    - 4
    - 202
  late_day_window_et:
    - "15:00"
    - "16:00"
  offhours_window_et_pre:
    - "04:00"
    - "09:30"
  offhours_window_et_post:
    - "16:00"
    - "20:00"

gate:
  coverage_min_pct: 95.0
  feature_missing_max_pct: 30.0
  feature_outlier_max_pct: 5.0
  min_passing_features: 2
  ic_threshold: 0.015
  abs_tstat_threshold: 2.0
  sign_consistent_windows_min: 7
