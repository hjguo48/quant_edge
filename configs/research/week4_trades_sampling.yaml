# Week 4 trades targeted sampling configuration.
# All research thresholds live here so estimator/gate reports can include a stable config hash.
version: 1
stage: pilot  # pilot | stage2

sampling:
  # Smoke-run scope (stage 1): real S1 v5 W11 only + top_n=50.
  # Reference: data/reports/walkforward_comparison_60d_v5_no_analyst_week3_done.json
  # S1 v5 W11 test window = 2023-09-01 → 2024-02-23.
  # Prior to commit 100d2c8 (universe DELETE bugfix) universe_membership historical anchors
  # were silently wiped by monthly sync → PIT returned 8 members at 2023-09. Bugfix
  # restored 2016-2026 full PIT coverage (503 members at 2023-09-15), so real historical
  # weak windows are now eligible. W11 chosen for smoke as it is the most recent S1 window
  # and validates both engineering + diagnostic on clean universe. After smoke PASS, extend
  # to additional weak windows (W4 COVID / W8 bear / etc.) via separate task.
  pilot:
    reasons:
      - weak_window
    earnings_window_days: 3
    gap_threshold_pct: 0.03
    weak_window_top_n: 50
    weak_windows:
      - name: W11
        start: "2023-09-01"
        end: "2024-02-23"
  stage2:
    top_n_liquidity: 200
    top_liquidity_lookback_days: 20

polygon:
  entitlement_delay_minutes: 15
  rest_max_pages_per_request: 50
  rest_page_size: 50000
  rest_min_interval_seconds: 0.05
  retry_max: 3

budgets:
  max_daily_api_calls: 50000
  max_storage_gb: 200
  max_rows_per_ticker_day: 2000000
  expected_pilot_ticker_days: 30000

features:
  size_threshold_dollars: 1000000
  size_threshold_min_cap_dollars: 250000
  # Intentionally empty for Task 0. Task 6 must record condition distributions and
  # can later populate this from Polygon trade condition-code documentation.
  condition_allow_list: []
  trf_exchange_codes:
    - 4
    - 202
  late_day_window_et:
    - "15:00"
    - "16:00"
  offhours_window_et_pre:
    - "04:00"
    - "09:30"
  offhours_window_et_post:
    - "16:00"
    - "20:00"

gate:
  coverage_min_pct: 95.0
  feature_missing_max_pct: 30.0
  feature_outlier_max_pct: 5.0
  min_passing_features: 2
  ic_threshold: 0.015
  abs_tstat_threshold: 2.0
  sign_consistent_windows_min: 7
