# 统一的特征家族注册表，用来约束研究协议中的候选特征分类。
as_of: 2026-04-17
base_feature_count: 133
missing_flag_count: 133
feature_count: 266

family_definitions:
  # 价格趋势、技术形态、均值回归、波动调整后的趋势类特征。
  price_momentum:
    description: 价格动量、趋势确认、技术指标与价格-波动交互
  # 流动性、成交量、残差收益、隔夜跳空与执行微结构代理。
  liquidity_microstructure:
    description: 流动性、微结构、成交量冲击与残差型特征
  # 估值、盈利质量、资产负债表与基本面组合因子。
  fundamental_quality:
    description: 估值、盈利能力、财务质量与基本面复合因子
  # 真实 analyst revisions 未来会归到这里；当前是代理指标。
  analyst_expectations_proxy:
    description: 分析师覆盖与预期修正代理
  # 空头拥挤与 insider 交易相关的持仓/拥挤度因子。
  shorting_crowding:
    description: 空头仓位、拥挤交易与内部人交易
  # 宏观 regime、利率曲线、信用利差与宏观交互项。
  macro_regime:
    description: 宏观 regime 与宏观交互特征
  # 财报惊喜、PEAD、SEC filing recency / count / burst 等事件特征。
  event_earnings_sec:
    description: 财报、PEAD 与 SEC filing 事件特征
  # 板块扩散、ETF 压力、sector-relative 与网络扩散代理。
  sector_network_diffusion:
    description: 板块扩散、ETF 轮动与 sector-relative 特征
  # 1D 执行层专属特征预留，目前为空。
  execution_risk:
    description: 执行风险与交易层控制特征（当前预留）

